<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade | Pac-Man</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="header">
            <h2>PAC-MAN</h2>
            <p>SCORE: <span id="score">0</span></p>
        </div>
        
        <div id="canvas-wrapper">
            <canvas id="gameCanvas" width="380" height="420"></canvas>
            
            <div id="ui-overlay">
                <h1 id="message">READY</h1>
                <button id="start-btn">PLAY</button>
            </div>
        </div>

        <div id="mobile-controls">
            <button class="d-pad" id="btn-up">▲</button>
            <div class="row">
                <button class="d-pad" id="btn-left">◀</button>
                <button class="d-pad" id="btn-down">▼</button>
                <button class="d-pad" id="btn-right">▶</button>
            </div>
        </div>
        
        <div id="footer">
            Developed by Kunal Dongare
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
